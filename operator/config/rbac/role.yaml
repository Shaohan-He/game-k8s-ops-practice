apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: game-platform-operator-manager-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "events", "persistentvolumeclaims", "secrets", "services"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["ops.shaohan.dev"]
    resources: ["gameplatforms"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["ops.shaohan.dev"]
    resources: ["gameplatforms/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["ops.shaohan.dev"]
    resources: ["gameplatforms/finalizers"]
    verbs: ["update"]