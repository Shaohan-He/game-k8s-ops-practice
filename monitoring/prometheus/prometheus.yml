global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: game-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - game-gateway:8000
          - login-service:8001
          - match-service:8002
          - room-service:8003

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

