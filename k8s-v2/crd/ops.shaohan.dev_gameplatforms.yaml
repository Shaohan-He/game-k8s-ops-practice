apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameplatforms.ops.shaohan.dev
spec:
  group: ops.shaohan.dev
  names:
    kind: GamePlatform
    listKind: GamePlatformList
    plural: gameplatforms
    singular: gameplatform
    shortNames:
      - gp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: ImageTag
          type: string
          jsonPath: .spec.imageTag
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                imageRegistry:
                  type: string
                  default: game-k8s-ops-practice
                imageTag:
                  type: string
                  default: "2.0.0"
                replicas:
                  type: integer
                  format: int32
                  minimum: 1
                  default: 2
                ingress:
                  type: object
                  properties:
                    host:
                      type: string
                      default: game.local
                    ingressClassName:
                      type: string
                      default: nginx
                monitoring:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                storage:
                  type: object
                  properties:
                    mysql:
                      type: object
                      properties:
                        size:
                          type: string
                          default: 2Gi
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Progressing, Ready, Degraded]
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                serviceStatuses:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      desired:
                        type: integer
                        format: int32
                      ready:
                        type: integer
                        format: int32
                      image:
                        type: string
                      rolloutState:
                        type: string